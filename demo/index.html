<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanskrit Word Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

  :root {
    --navy: #1E2761;
    --accent: #7B2D26;
    --cream: #f7f6f2;
    --body: #2c3e50;
    --light-gray: #e8e6e1;
    --mid-gray: #8a8a8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--cream);
    color: var(--body);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy);
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  header h1 {
    font-family: 'Crimson Pro', serif;
    color: white;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  header p {
    color: rgba(202, 220, 252, 0.85);
    font-size: 0.95rem;
    margin-top: 0.4rem;
  }

  /* ── SEARCH ── */
  .search-container {
    max-width: 640px;
    margin: -1.5rem auto 0;
    padding: 0 1.5rem;
    position: relative;
    z-index: 10;
  }
  .search-box {
    width: 100%;
    padding: 1rem 1.4rem;
    font-size: 1.15rem;
    font-family: 'Inter', sans-serif;
    border: 2px solid var(--light-gray);
    border-radius: 12px;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus {
    border-color: var(--navy);
  }
  .search-box::placeholder {
    color: #aaa;
  }

  /* ── SUGGESTIONS ── */
  .suggestions {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 1.5rem;
    position: relative;
    z-index: 9;
  }
  .suggestions-list {
    background: white;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    overflow: hidden;
    display: none;
  }
  .suggestion-item {
    padding: 0.75rem 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    border-bottom: 1px solid var(--light-gray);
    transition: background 0.15s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item.active {
    background: rgba(30, 39, 97, 0.06);
  }
  .suggestion-deva {
    font-size: 1.3rem;
    color: var(--navy);
    font-weight: 600;
  }
  .suggestion-iast {
    font-size: 1rem;
    color: var(--body);
    font-style: italic;
  }
  .suggestion-gloss {
    font-size: 0.82rem;
    color: var(--mid-gray);
    margin-left: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  /* ── TERM LIST (browse) ── */
  .term-grid {
    max-width: 820px;
    margin: 2rem auto;
    padding: 0 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
  }
  .term-chip {
    padding: 0.4rem 0.9rem;
    background: white;
    border: 1px solid var(--light-gray);
    border-radius: 20px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--body);
  }
  .term-chip:hover {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .term-chip .chip-deva {
    margin-right: 0.3rem;
  }
  .browse-label {
    text-align: center;
    color: var(--mid-gray);
    font-size: 0.8rem;
    margin-top: 2rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── RESULT CARD ── */
  .result-container {
    max-width: 820px;
    margin: 2rem auto;
    padding: 0 1.5rem;
    display: none;
  }
  .result-card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Card header */
  .card-header {
    background: var(--navy);
    padding: 2rem 2.5rem;
    position: relative;
  }
  .card-deva {
    font-size: 3.2rem;
    color: white;
    font-weight: 700;
    line-height: 1.2;
  }
  .card-iast {
    font-family: 'Crimson Pro', serif;
    font-size: 1.5rem;
    color: rgba(202, 220, 252, 0.9);
    font-style: italic;
    margin-top: 0.2rem;
  }
  .card-gloss-short {
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
    margin-top: 0.5rem;
  }
  .card-confidence {
    position: absolute;
    top: 1.5rem;
    right: 2rem;
    padding: 0.25rem 0.7rem;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .conf-high { background: rgba(46,204,113,0.2); color: #2ecc71; }
  .conf-medium { background: rgba(241,196,15,0.25); color: #f1c40f; }
  .conf-low { background: rgba(231,76,60,0.2); color: #e74c3c; }

  /* Segmentation strip */
  .segmentation-strip {
    background: rgba(30, 39, 97, 0.92);
    padding: 1rem 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .seg-piece {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .seg-label {
    font-size: 0.85rem;
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    font-weight: 500;
  }
  .seg-prefix { background: rgba(123,45,38,0.5); color: #f0c0b0; }
  .seg-root { background: rgba(255,255,255,0.2); color: white; font-weight: 700; }
  .seg-suffix { background: rgba(202,220,252,0.2); color: #cadcfc; }
  .seg-plus {
    color: rgba(255,255,255,0.4);
    font-size: 1.1rem;
    font-weight: 300;
  }

  /* Card body sections */
  .card-body { padding: 0; }
  .card-section {
    padding: 1.5rem 2.5rem;
    border-bottom: 1px solid var(--light-gray);
  }
  .card-section:last-child { border-bottom: none; }
  .section-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--mid-gray);
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .section-content {
    font-size: 0.95rem;
    line-height: 1.65;
    color: var(--body);
  }
  .section-content.serif {
    font-family: 'Crimson Pro', serif;
    font-size: 1.05rem;
  }

  /* Morphology grid */
  .morph-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 600px) {
    .morph-grid { grid-template-columns: 1fr; }
  }
  .morph-item {
    background: var(--cream);
    border-radius: 10px;
    padding: 1rem;
  }
  .morph-type {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--mid-gray);
    font-weight: 600;
    margin-bottom: 0.3rem;
  }
  .morph-value {
    font-family: 'Crimson Pro', serif;
    font-size: 1.15rem;
    color: var(--navy);
    font-weight: 600;
  }
  .morph-meaning {
    font-size: 0.82rem;
    color: var(--body);
    margin-top: 0.2rem;
    line-height: 1.4;
  }

  /* Chinese mapping */
  .chinese-cards {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .chinese-card {
    flex: 1 1 200px;
    background: var(--cream);
    border-radius: 10px;
    padding: 1.2rem;
    border-left: 3px solid var(--accent);
  }
  .chinese-chars {
    font-size: 2rem;
    color: var(--navy);
    font-weight: 700;
  }
  .chinese-pinyin {
    font-size: 0.9rem;
    color: var(--mid-gray);
    font-style: italic;
  }
  .chinese-type {
    display: inline-block;
    margin-top: 0.4rem;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
  }
  .type-transliteration { background: rgba(30,39,97,0.1); color: var(--navy); }
  .type-semantic_translation, .type-semantic { background: rgba(123,45,38,0.1); color: var(--accent); }
  .type-hybrid { background: rgba(241,196,15,0.15); color: #b8860b; }
  .type-broad_equivalent { background: rgba(142,142,142,0.15); color: #666; }

  .chapter-ref {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--accent);
  }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: none;
    border: none;
    color: var(--mid-gray);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.5rem 0;
    margin-bottom: 0.8rem;
    font-family: 'Inter', sans-serif;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--navy); }

  /* No results */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--mid-gray);
    font-style: italic;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--mid-gray);
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<header>
  <h1>Sanskrit Word Explorer</h1>
  <p>Type a Sanskrit term to see its morphological breakdown</p>
</header>

<div class="search-container">
  <input type="text" class="search-box" id="search"
         placeholder="Try: samadhi, dhyana, nirodha, avidya..."
         autocomplete="off" spellcheck="false">
</div>

<div class="suggestions">
  <div class="suggestions-list" id="suggestions"></div>
</div>

<div id="browse">
  <p class="browse-label">Or browse all 20 terms</p>
  <div class="term-grid" id="termGrid"></div>
</div>

<div class="result-container" id="result"></div>

<footer>
  Sanskrit Etymology Project — Data from Monier-Williams, GRETIL, SARIT, CBETA
</footer>

<script>
let TERMS = [];
let activeIdx = -1;

fetch('terms.json')
  .then(r => r.json())
  .then(data => {
    TERMS = data;
    renderGrid();
  });

// ── SEARCH ──
const searchEl = document.getElementById('search');
const sugEl = document.getElementById('suggestions');
const browseEl = document.getElementById('browse');
const resultEl = document.getElementById('result');

searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  activeIdx = -1;
  if (!q) { hideSuggestions(); return; }
  const matches = TERMS.filter(t =>
    t.search_aliases.some(a => a.startsWith(q)) ||
    t.devanagari.includes(q) ||
    t.transliteration.toLowerCase().includes(q)
  );
  showSuggestions(matches);
});

searchEl.addEventListener('keydown', (e) => {
  const items = sugEl.querySelector('.suggestions-list')?.children;
  if (!items || !items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    updateActive(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    activeIdx = Math.max(activeIdx - 1, 0);
    updateActive(items);
  } else if (e.key === 'Enter' && activeIdx >= 0) {
    e.preventDefault();
    const id = items[activeIdx].dataset.id;
    selectTerm(id);
  }
});

function updateActive(items) {
  [...items].forEach((el, i) => el.classList.toggle('active', i === activeIdx));
}

function showSuggestions(matches) {
  if (!matches.length) {
    sugEl.querySelector('.suggestions-list').innerHTML =
      '<div class="no-results">No matching terms</div>';
    sugEl.querySelector('.suggestions-list').style.display = 'block';
    return;
  }
  const html = matches.slice(0, 8).map(t => `
    <div class="suggestion-item" data-id="${t.id}" onclick="selectTerm('${t.id}')">
      <span class="suggestion-deva">${t.devanagari}</span>
      <span class="suggestion-iast">${t.transliteration}</span>
      <span class="suggestion-gloss">${truncate(t.literal_gloss, 40)}</span>
    </div>
  `).join('');
  sugEl.querySelector('.suggestions-list').innerHTML = html;
  sugEl.querySelector('.suggestions-list').style.display = 'block';
}

function hideSuggestions() {
  sugEl.querySelector('.suggestions-list').style.display = 'none';
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

// ── BROWSE GRID ──
function renderGrid() {
  const grid = document.getElementById('termGrid');
  grid.innerHTML = TERMS.map(t => `
    <div class="term-chip" onclick="selectTerm('${t.id}')">
      <span class="chip-deva">${t.devanagari}</span>
      ${t.transliteration}
    </div>
  `).join('');
}

// ── SELECT & RENDER ──
function selectTerm(id) {
  const term = TERMS.find(t => t.id === id);
  if (!term) return;
  hideSuggestions();
  searchEl.value = '';
  browseEl.style.display = 'none';
  resultEl.style.display = 'block';
  resultEl.innerHTML = renderCard(term);
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function goBack() {
  resultEl.style.display = 'none';
  resultEl.innerHTML = '';
  browseEl.style.display = 'block';
  searchEl.focus();
}

function renderCard(t) {
  // Build segmentation pieces
  const segPieces = buildSegmentation(t);

  // Morphology cards
  const morphCards = [];
  for (const p of (t.prefixes || [])) {
    morphCards.push({ type: 'Prefix', value: p.prefix, meaning: p.meaning, cls: 'seg-prefix' });
  }
  for (const r of (t.roots || [])) {
    morphCards.push({ type: 'Root', value: r.root + (r.devanagari ? ` ${r.devanagari}` : ''), meaning: r.meaning, cls: 'seg-root' });
  }
  for (const s of (t.suffixes || [])) {
    morphCards.push({ type: 'Suffix', value: s.suffix, meaning: s.meaning + (s.grammatical_function ? ` — ${s.grammatical_function}` : ''), cls: 'seg-suffix' });
  }

  // Chinese section
  let chineseHtml = '';
  const candidates = t.mapping?.candidates || t.chinese_counterparts;
  if (candidates && candidates.length) {
    const cards = candidates.map(c => {
      const chars = c.characters;
      const pinyin = c.pinyin;
      const mtype = c.mapping_type || '';
      const typeCls = 'type-' + mtype.replace(/\s/g, '_');
      return `
        <div class="chinese-card">
          <div class="chinese-chars">${chars}</div>
          <div class="chinese-pinyin">${pinyin}</div>
          <span class="chinese-type ${typeCls}">${mtype.replace(/_/g, ' ')}</span>
        </div>
      `;
    }).join('');
    chineseHtml = `
      <div class="card-section">
        <div class="section-label">Chinese Buddhist Equivalents</div>
        <div class="chinese-cards">${cards}</div>
      </div>
    `;
  }

  // Compound type
  const compoundHtml = t.compound_type ? `
    <div class="card-section">
      <div class="section-label">Compound Type</div>
      <div class="section-content">${t.compound_type}</div>
    </div>
  ` : '';

  // Ambiguity
  const ambiguityHtml = t.ambiguity_notes ? `
    <div class="card-section">
      <div class="section-label">Scholarly Notes</div>
      <div class="section-content serif">${t.ambiguity_notes}</div>
    </div>
  ` : '';

  const confCls = t.confidence === 'high' ? 'conf-high' : t.confidence === 'medium' ? 'conf-medium' : 'conf-low';

  return `
    <button class="back-btn" onclick="goBack()">← Back to all terms</button>
    <div class="result-card">
      <div class="card-header">
        <span class="card-confidence ${confCls}">${t.confidence} confidence</span>
        <div class="card-deva">${t.devanagari}</div>
        <div class="card-iast">${t.transliteration}</div>
        <div class="card-gloss-short">${t.literal_gloss}</div>
      </div>

      <div class="segmentation-strip">
        ${segPieces}
      </div>

      <div class="card-body">
        <div class="card-section">
          <div class="section-label">Morphological Components</div>
          <div class="morph-grid">
            ${morphCards.map(m => `
              <div class="morph-item">
                <div class="morph-type">${m.type}</div>
                <div class="morph-value">${m.value}</div>
                <div class="morph-meaning">${m.meaning}</div>
              </div>
            `).join('')}
          </div>
        </div>

        ${compoundHtml}

        <div class="card-section">
          <div class="section-label">Yoga Sutras Reference</div>
          <div class="section-content">
            <span class="chapter-ref">${t.chapter}</span>
          </div>
        </div>

        <div class="card-section">
          <div class="section-label">Philosophical Meaning</div>
          <div class="section-content serif">${t.philosophical_gloss}</div>
        </div>

        <div class="card-section">
          <div class="section-label">Doctrinal Significance</div>
          <div class="section-content serif">${t.doctrinal_significance}</div>
        </div>

        ${chineseHtml}
        ${ambiguityHtml}
      </div>
    </div>
  `;
}

function buildSegmentation(t) {
  if (!t.segmentation) return '';
  // Parse "sam + ā + √dhā + -i" into labeled pieces
  const parts = t.segmentation.split(/\s*\+\s*/);
  const prefixNames = (t.prefixes || []).map(p => p.prefix.replace('-',''));
  const rootNames = (t.roots || []).map(r => r.root.replace('√',''));
  const suffixNames = (t.suffixes || []).map(s => s.suffix.replace('-',''));

  return parts.map((part, i) => {
    const clean = part.replace(/[√\-]/g, '');
    let cls = 'seg-root';
    if (prefixNames.some(p => clean.includes(p) || p.includes(clean))) cls = 'seg-prefix';
    else if (suffixNames.some(s => clean.includes(s) || s.includes(clean))) cls = 'seg-suffix';
    else if (rootNames.some(r => clean.includes(r) || r.includes(clean))) cls = 'seg-root';

    const plus = i < parts.length - 1 ? '<span class="seg-plus">+</span>' : '';
    return `<span class="seg-piece"><span class="seg-label ${cls}">${part}</span>${plus}</span>`;
  }).join('');
}

// Close suggestions when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-container') && !e.target.closest('.suggestions')) {
    hideSuggestions();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanskrit Word Explorer</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header>
      <h1>Sanskrit Word Explorer</h1>
      <p>Browse the project's 84-term Sanskrit demo bundle</p>
    </header>

    <div class="search-container">
      <input
        id="search"
        class="search-box"
        type="text"
        placeholder="Try: samadhi, dhyana, nirodha, kaivalya..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="suggestions">
      <div id="suggestions" class="suggestions-list"></div>
    </div>

    <div id="browse">
      <div id="termGrid" class="term-grid"></div>
    </div>

    <div id="result" class="result-container"></div>

    <footer>
      Rebuilt from the 84-term demo bundle with canonical analysis and mapping overlays.
    </footer>

    <script src="terms_inline.js"></script>
    <script src="assets/app.js"></script>
  </body>
</html>

    literal_gloss: "person; conscious subject; self"
    philosophical_gloss: >
      Puruṣa is the metaphysical foundation of the Yoga Sutras: pure,
      unchanging consciousness, radically distinct from prakṛti (material
      nature). Puruṣa does not act, think, or change — it witnesses. The
      mind (citta), the body, the senses, and all experience belong to
      prakṛti. Puruṣa's apparent entanglement with prakṛti is the root
      error (avidyā), and its disentanglement is liberation (kaivalya).
      Patañjali inherits this framework from Sāṃkhya philosophy but adds
      a practical soteriological path (yoga). Key differences from other
      systems: unlike Vedāntic ātman, puruṣa in Sāṃkhya-Yoga is one of
      many (each being has its own puruṣa); unlike Buddhist anātman ("no-self"),
      Sāṃkhya-Yoga affirms a real, permanent self. Patañjali also posits
      a special puruṣa (puruṣa-viśeṣa) called Īśvara — a consciousness
      never entangled with prakṛti (YS 1.24).
    doctrinal_significance: >
      Puruṣa is the "who" of the Yoga Sutras — the one for whose sake the
      entire system exists. Without understanding puruṣa, the purpose of
      yoga is unintelligible: why still the mind? Because puruṣa, which is
      not the mind, is currently misidentified with it. Stilling the mind
      reveals that puruṣa was always free. This is also the major point of
      divergence from Buddhism, which denies a permanent self altogether.

    ambiguity_notes: >
      The etymology of puruṣa is genuinely debated among scholars. Major
      proposals include: (1) puri-śaya, "one who lies in the city [of the
      body]" — a folk etymology found in the Bṛhadāraṇyaka Upaniṣad and
      widely cited but not linguistically standard; (2) connection to puru
      ("much, full") + a nominal suffix, yielding "the full one" or "the
      abundant one"; (3) derivation from √pṝ ("to fill") via pūru; (4) a
      very old word without a transparent etymology, possibly pre-Indo-
      European or borrowed. Monier-Williams lists the word without
      committing to a single derivation. Mayrhofer's Etymological Dictionary
      treats it as of uncertain origin. This is one of the rare cases where
      honest morphological analysis must say: the etymology is not settled.
      The confidence rating is for the philosophical analysis, not the
      morphological derivation.
    confidence: medium

    chinese_counterparts: null
    mapping_type: null
    phonetic_evidence: null
    semantic_evidence: >
      Puruṣa as a Sāṃkhya-Yoga concept has no standard Chinese Buddhist
      equivalent because the metaphysical framework (permanent, plural
      selves distinct from material nature) is rejected by Buddhist
      philosophy. Buddhist Chinese texts sometimes use 人 (rén, "person")

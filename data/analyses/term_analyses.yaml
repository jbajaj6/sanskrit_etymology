    literal_gloss: "own form; one's own nature or essential character"
    philosophical_gloss: >
      Svarūpa is one of the most important technical terms in the Yoga Sutras
      despite its apparent simplicity. YS 1.3 says that when yoga succeeds,
      "the seer abides in its own form" (svarūpe 'vasthānam). This means
      puruṣa recognizes itself as what it always was — pure awareness, not
      the mind or body with which it was previously confused. Conversely,
      YS 1.4 says that at other times, puruṣa takes on the form of the
      vṛttis (vṛtti-sārūpyam) — it seems to become its thoughts. The
      interplay between svarūpa (own form) and sārūpya (same-form,
      identification with something else) is the core dialectic of the text.
      In YS 3.3, samādhi is described as "svarūpa-śūnyam iva" — "as if
      empty of its own form." This means that in samādhi, the meditator's
      awareness loses its sense of being a separate observer and becomes
      transparent to the object. The Buddhist usage of svarūpa/svabhāva
      ("own-nature") is almost precisely opposite: Mādhyamaka philosophy
      argues that nothing has svarūpa — the absence of inherent nature
      (svabhāva-śūnyatā) is the central insight.
    doctrinal_significance: >
      Svarūpa answers the question "what am I, really?" in the Yoga Sutras.
      The entire arc of practice moves from misidentification (vṛtti-sārūpya,
      taking on the form of one's thoughts) to recognition (svarūpe 'vasthānam,
      resting in one's own nature). For a meditation-focused class, this is
      the term that names what meditation reveals.

    ambiguity_notes: >
      The compound sva + rūpa is transparent and uncontested (karmadhāraya
      compound, Monier-Williams s.v. svarūpa). The philosophical ambiguity
      lies in the tension between YS 1.3 (puruṣa rests in its svarūpa =
      own nature) and YS 3.3 (samādhi is svarūpa-śūnya = empty of own
      form). These are not contradictory: in YS 1.3, it is puruṣa's
      svarūpa (which is real); in YS 3.3, it is the meditator-as-observer's
      svarūpa (which dissolves). The same word operates at different levels.
      The contrast with Buddhist svabhāva-śūnyatā ("emptiness of own-nature")
      is one of the deepest philosophical fissures between the traditions.
    confidence: high


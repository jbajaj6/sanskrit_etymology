      limbs (yama, niyama, āsana, prāṇāyāma) are external preparations;
      the last three (dhāraṇā, dhyāna, samādhi) are internal absorptions.
      Pratyāhāra is the bridge — the moment where attention shifts from
      outer to inner. For a meditation practitioner, it corresponds to the
      transition from "settling in" to actual meditative work.


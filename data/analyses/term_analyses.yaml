  # ═══════════════════════════════════════════
  # 12. ABHYĀSA
  # ═══════════════════════════════════════════

  - id: abhyasa
    devanagari: अभ्यास
    transliteration: abhyāsa

    chapter: "YS 1.12–1.14, 1.18, 1.32"
    source_context: >
      YS 1.12: abhyāsa-vairāgyābhyāṃ tan-nirodhaḥ ("That cessation [of
      citta-vṛtti] is [achieved] by abhyāsa and vairāgya"). YS 1.13:
      tatra sthitau yatno 'bhyāsaḥ ("Abhyāsa is the effort toward
      steadiness there [in the stilling of vṛttis]"). YS 1.14: sa tu
      dīrgha-kāla-nairantarya-satkārāsevito dṛḍha-bhūmiḥ ("But that
      [abhyāsa] becomes firmly grounded when cultivated for a long time,
      without interruption, and with devotion"). Found in GRETIL: Ānandakanda
      ("abhyāsanirato") and Dhvanyāloka commentary ("abhyāsaḥ paunaḥpunyam").

    segmentation: "abhi + ā + √as + -a"
    roots:
      - root: "√as"
        devanagari: "√अस्"
        meaning: "to throw, cast, shoot"
        dhatu_number: null
    prefixes:
      - prefix: "abhi-"
        meaning: "toward, over, upon (here: intensive — repeated direction toward)"
      - prefix: "ā-"
        meaning: "unto, toward (reinforcing directionality)"
    suffixes:
      - suffix: "-a"
        meaning: "action noun suffix (ghañ pratyaya)"
        grammatical_function: "forms a masculine action noun denoting the process of repeated throwing-toward"
    compound_type: null

    literal_gloss: "a repeated casting-toward; a throwing oneself at [something] again and again"
    philosophical_gloss: >
      Abhyāsa in the Yoga Sutras is one of the two foundational means to
      nirodha, paired with vairāgya (non-attachment) in YS 1.12. Patañjali
      defines it precisely as "the effort toward steadiness" (sthitau yatnaḥ,
      YS 1.13) — the sustained, intentional return to the practice of stilling
      the mind. Three conditions make abhyāsa firm: long duration
      (dīrgha-kāla), unbroken continuity (nairantarya), and reverent
      dedication (satkāra). This is not mere repetition but committed,
      devoted, patient practice sustained over time. The term appears in
      other Sanskrit literature for "repeated study" or "exercise" generally,
      but Patañjali gives it a specific technical meaning.
    doctrinal_significance: >
      Abhyāsa answers the practical question: how does one actually achieve
      nirodha? The answer is sustained practice paired with non-attachment.
      This makes abhyāsa one of the most practically important terms in the
      entire text — it is the instruction that converts philosophy into
      discipline. YS 1.14's three conditions (long time, no interruption,
      devotion) also manage student expectations: this is not a quick fix.

    ambiguity_notes: >
      The root √as ("to throw") is sometimes confused with √as ("to be,"
      class 2). The derivation abhi + ā + √as (4th class, "to throw")
      yielding abhyāsa ("a repeated throwing-toward") is the standard
      analysis (Monier-Williams s.v. abhyāsa). The alternative root √as
      ("to sit"), yielding a sense of "sitting near" (as in upāsana), has
      been proposed but is not the mainstream derivation. Apte and
      Monier-Williams both give √as ("to throw, cast") as primary.
      The Dhvanyāloka commentary gloss "paunaḥpunya" ("repetition")
      confirms the iterative sense.
    confidence: medium


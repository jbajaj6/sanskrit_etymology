      cessation, [and only] a residue of saṃskāras remains"). YS 1.50:
      taj-jaḥ saṃskāro 'nya-saṃskāra-pratibandhī ("The saṃskāra born
      of that [truth-bearing wisdom] obstructs other saṃskāras"). Found
      in GRETIL: Āṅgirasasmṛti uses saṃskāra in the ritual-consecration
      sense; Ānandakanda uses it for alchemical purification — showing the
      word's broad semantic range.

    segmentation: "sam + √kṛ + -a"
    roots:
      - root: "√kṛ"
        devanagari: "√कृ"
        meaning: "to do, make, perform"
        dhatu_number: null
    prefixes:
      - prefix: "sam-"
        meaning: "together, completely, well (here: thorough preparation or formation)"
    suffixes:
      - suffix: "-a (with guṇa of root)"
        meaning: "action/result noun suffix (ghañ pratyaya)"
        grammatical_function: "forms a masculine noun; √kṛ → kāra with guṇa; sam + s + kāra = saṃskāra"
    compound_type: null

    literal_gloss: "a putting-together; a thorough making, preparation, or formation"
    philosophical_gloss: >
      Saṃskāra has an enormous semantic range in Sanskrit. In ritual contexts
      it means "consecration" or "sacrament" (the saṃskāras of life: birth,
      initiation, marriage, death). In grammar, it means "refinement" (saṃskṛta =
      "refined" = Sanskrit, the "perfected" language). In the Yoga Sutras,
      saṃskāra is a psychological term: latent impressions or subliminal
      traces left in citta by every experience and action. These traces
      accumulate and shape future perception, desire, and behavior —
      functioning as a kind of unconscious programming. Crucially, saṃskāras
      from samādhi can overwrite saṃskāras from ordinary experience (YS 1.50),
      which is the mechanism by which practice gradually transforms the mind.
      In Buddhism (Pali: saṅkhāra), the term is the second link in dependent
      origination and one of the five aggregates (skandhas), meaning
      "volitional formations" or "conditioned mental activities."
    doctrinal_significance: >
      Saṃskāra explains the persistence of habit and the mechanism of
      karmic continuity. It is why liberation requires sustained practice
      (abhyāsa) rather than a single insight — old saṃskāras must be
      overwritten by new ones born of meditative wisdom. The concept also
      explains why the same experience affects different people differently:
      each person's citta carries a unique accumulation of saṃskāras.

    ambiguity_notes: >
      The morphology sam + √kṛ → saṃskāra involves an epenthetic 's' between
      the prefix sam- and the root kṛ (sam + s + kāra). This is standard
      sandhi and well documented (Monier-Williams s.v. saṃskāra). The real
      complexity is semantic: saṃskāra means very different things in ritual,
      grammatical, philosophical, and Buddhist contexts. For the Yoga Sutras,
      the psychological reading ("latent impression") is correct. The Buddhist
      saṅkhāra overlaps but is not identical — in the five aggregates
      (skandhas), saṅkhāra includes active volitional formations, not just
      latent traces.
    confidence: high


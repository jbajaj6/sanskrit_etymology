    literal_gloss: "the state of being without coloring; freedom from passionate attachment"
    philosophical_gloss: >
      Vairāgya is one of the two foundational means to nirodha, paired with
      abhyāsa in YS 1.12. If abhyāsa is the active effort (doing), vairāgya
      is the corresponding release (letting go). Patañjali describes two
      levels: ordinary vairāgya is freedom from craving for sensory objects
      (YS 1.15); the higher vairāgya (para-vairāgya, YS 1.16) is freedom
      from craving for the guṇas themselves — for any experience at all,
      however subtle. This higher vairāgya arises only from direct knowledge
      of puruṣa. The etymological image is striking: rāga literally means
      "coloring" or "dyeing" — the way desire tinges or stains awareness.
      Vairāgya is the removal of that coloring, leaving awareness clear.
    doctrinal_significance: >
      Vairāgya prevents practice from becoming another form of grasping.
      Without it, even meditation can become an object of attachment.
      The pairing of abhyāsa and vairāgya is one of the Yoga Sutras'
      most psychologically astute insights: effort without non-attachment
      is strain; non-attachment without effort is passivity. Both are
      required together.

    ambiguity_notes: >

    philosophical_gloss: >
      Pratyāhāra is the fifth limb — the turning point between the outer
      and inner practices. It describes the process by which the senses
      disengage from their objects and follow the inward movement of citta.
      Patañjali's definition (YS 2.54) uses a striking simile: the senses
      "imitate the own-form of citta" (svarūpānukāra iva). Just as bees
      follow the queen, the senses follow the mind when it withdraws. This
      is not forceful suppression of sensory experience but a natural turning-
      inward: when citta withdraws from external engagement, the senses
      follow. The result is "supreme mastery over the senses" (paramā
      vaśyatā, YS 2.55). In Sanskrit grammar, pratyāhāra also means an
      abbreviatory formula (the Māheśvara sūtras), though this technical
      usage is unrelated to the yogic meaning.

    literal_gloss: "a settling-deeply-into; a thorough taking-possession; a deep clinging"
    philosophical_gloss: >
      Abhiniveśa is the fifth and final kleśa (affliction) in Patañjali's
      system. It is usually translated as "clinging to life" or "fear of
      death," but the Sanskrit is more precise: it is the instinctive,
      deep-seated will to continue existing. Patañjali's description
      (YS 2.9) is psychologically remarkable: abhiniveśa "flows by its
      own momentum" (sva-rasa-vāhī) and is "firmly established even in
      the wise" (viduṣo 'pi tathārūḍhaḥ). This means it is not a product
      of reasoning or experience — even someone who intellectually
      understands that death is not to be feared still instinctively
      recoils from it. Patañjali implies that abhiniveśa is rooted in
      saṃskāras from past lives: the memory of having died before
      (even if not consciously accessible) generates an automatic survival
      drive. This is one of the Yoga Sutras' most original psychological
      observations — a description of what modern psychology might call
      a hardwired survival instinct, but explained through the mechanism
      of karmic memory.
    doctrinal_significance: >
      Abhiniveśa reveals that the kleśas are not merely intellectual errors
      but embodied, instinctual patterns. Even knowledge cannot dissolve
      the fifth kleśa by itself — this is why sustained practice (abhyāsa)
      is necessary in addition to insight. For a meditation-focused class,
      abhiniveśa names the deepest resistance a practitioner encounters:
      the organism's refusal to let go.

    ambiguity_notes: >

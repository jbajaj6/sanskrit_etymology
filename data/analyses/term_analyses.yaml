    philosophical_gloss: >
      In the Yoga Sutras, kleśa is a technical term for the five root causes
      of suffering: avidyā (ignorance), asmitā (ego-sense), rāga (attachment),
      dveṣa (aversion), and abhiniveśa (clinging to life). These are not
      passing emotions but deep structural distortions in how citta relates
      to experience. Avidyā is the root kleśa from which the other four
      grow (YS 2.4). The kleśas can exist in four states: dormant (prasupta),
      attenuated (tanu), alternating (vicchinna), or fully active (udāra).
      In Buddhist usage, kleśa (Pali: kilesa) similarly denotes mental
      afflictions, though the specific enumeration differs (three root
      poisons: rāga, dveṣa, moha).

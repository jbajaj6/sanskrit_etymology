  # 10. SAṂSKĀRA
  # ═══════════════════════════════════════════

  - id: samskara
    devanagari: संस्कार
    transliteration: saṃskāra

    chapter: "YS 1.18, 1.50, 3.9–3.10, 3.18, 4.9, 4.27"
    source_context: >
      YS 1.18: virāma-pratyayābhyāsa-pūrvakaḥ saṃskāra-śeṣo 'nyaḥ

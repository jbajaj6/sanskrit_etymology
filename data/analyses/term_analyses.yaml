    chapter: "YS 1.3, 1.43, 2.23, 2.54, 3.3, 3.44, 3.46, 4.12, 4.34"
    source_context: >
      YS 1.3: tadā draṣṭuḥ svarūpe 'vasthānam ("Then the seer abides
      in its own form"). This immediately follows YS 1.2 and states
      what happens when citta-vṛtti-nirodha is achieved: puruṣa rests
      in svarūpa — its own nature. YS 3.3 defines samādhi as
      "svarūpa-śūnyam iva" — "as if empty of its own form." Found
      across GRETIL in Buddhist stotras, Āṅgirasasmṛti, and Śaiva
      Pratyabhijñā literature.

    segmentation: "sva + rūpa"

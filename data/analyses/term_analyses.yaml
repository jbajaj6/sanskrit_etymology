        devanagari: "√रञ्ज्"
        meaning: "to be colored, dyed, excited, attached, passionate"
        dhatu_number: null
    prefixes:
      - prefix: "vi-"
        meaning: "apart, away, without (here: negation/absence — 'without coloring')"
    suffixes:

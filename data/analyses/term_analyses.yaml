    prefixes: []
    suffixes:
      - suffix: "-a"
        meaning: "action/result noun suffix (ghañ pratyaya)"
        grammatical_function: "forms a masculine noun denoting the result of the verbal action: 'that which afflicts'"
    compound_type: null

    literal_gloss: "affliction; that which torments or causes pain"
    philosophical_gloss: >
      In the Yoga Sutras, kleśa is a technical term for the five root causes
      of suffering: avidyā (ignorance), asmitā (ego-sense), rāga (attachment),
      dveṣa (aversion), and abhiniveśa (clinging to life). These are not
      passing emotions but deep structural distortions in how citta relates
      to experience. Avidyā is the root kleśa from which the other four
      grow (YS 2.4). The kleśas can exist in four states: dormant (prasupta),
      attenuated (tanu), alternating (vicchinna), or fully active (udāra).
      In Buddhist usage, kleśa (Pali: kilesa) similarly denotes mental
      afflictions, though the specific enumeration differs (three root
      poisons: rāga, dveṣa, moha).
    doctrinal_significance: >
      The kleśas explain why beings suffer and why yoga is necessary.
      They are not sins or moral failings but psychological structures —
      habitual patterns of misperception. The goal of practice is not to
      suppress them but to attenuate and eventually uproot them through
      the combined force of abhyāsa (practice) and viveka-khyāti
      (discriminative discernment).

    ambiguity_notes: >
      The derivation √kliś + -a is standard (Monier-Williams s.v. kleśa).
      The vowel change from kliś to kleś follows guṇa ablaut rules.
      No morphological controversy. The cross-tradition comparison is
      important: both Yoga and Buddhism use kleśa for mental afflictions,
      but enumerate them differently. The shared term suggests historical
      contact or common inheritance from pre-systematic śramaṇa traditions.
    confidence: high


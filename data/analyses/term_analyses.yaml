  # ═══════════════════════════════════════════
  # 8. KLEŚA
  # ═══════════════════════════════════════════

  - id: klesa
    devanagari: क्लेश
    transliteration: kleśa

    chapter: "YS 1.24, 2.2–2.9, 2.12–2.13, 2.28, 4.28, 4.30"
    source_context: >
      YS 2.3: avidyāsmitārāgadveṣābhiniveśāḥ kleśāḥ ("The kleśas are:
      ignorance, ego-sense, attachment, aversion, and clinging to life").
      YS 2.2: samādhi-bhāvanārthaḥ kleśa-tanū-karaṇārthaś ca ("For the
      purpose of cultivating samādhi and for the purpose of attenuating
      the kleśas"). Found across GRETIL and SARIT in Buddhist stotra and
      medical literature contexts as well.

    segmentation: "√kliś + -a"
    roots:
      - root: "√kliś"
        devanagari: "√क्लिश्"
        meaning: "to torment, afflict, cause pain"

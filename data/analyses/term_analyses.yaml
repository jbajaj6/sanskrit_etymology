  - id: asamprajnata
    devanagari: असम्प्रज्ञात
    transliteration: asamprajñāta

    chapter: "YS 1.18"
    source_context: >
      YS 1.18: virāma-pratyayābhyāsa-pūrvakaḥ saṃskāra-śeṣo 'nyaḥ
      ("The other [samādhi] is preceded by the practice of cessation,
      [and only] a residue of saṃskāras remains"). Note: the word
      "asamprajñāta" does not literally appear in YS 1.18 — the sutra
      says only "anyaḥ" ("the other"). The term asamprajñāta is supplied
      by Vyāsa's Bhāṣya commentary. Found in GRETIL: Bhagavadgītā
      commentaries cross-reference YS 1.18 using the term asamprajñāta;
      Jīva Gosvāmī's Ṣaṭsandarbha distinguishes asamprajñāta-samādhi
      from brahma-samādhi.

    segmentation: "a + sam + pra + √jñā + -ta"
    roots:
      - root: "√jñā"
        devanagari: "√ज्ञा"
        meaning: "to know, perceive, understand"
        dhatu_number: null
    prefixes:
      - prefix: "a-"
        meaning: "not, without (nañ prefix — negating the entire compound)"
      - prefix: "sam-"
        meaning: "together, completely (intensifying)"
      - prefix: "pra-"
        meaning: "forth, forward (here: thorough or higher knowing)"
    suffixes:
      - suffix: "-ta"
        meaning: "past passive participle suffix (kṛdanta)"
        grammatical_function: "forms a past participle: samprajñāta = 'thoroughly known/cognized'; asamprajñāta = 'not-thoroughly-cognized'"
    compound_type: null

    literal_gloss: "not-fully-cognized; without the cognitive content of complete knowing"
    philosophical_gloss: >
      Asamprajñāta-samādhi is the higher of the two broad types of samādhi
      in the Yoga Sutras. In samprajñāta-samādhi (YS 1.17), awareness is
      absorbed but still has a cognitive object — there is something being
      known. In asamprajñāta-samādhi, even that cognitive content drops
      away. What remains is awareness without an object: no vitarka
      (deliberation), no vicāra (reflection), no ānanda (bliss as experienced),
      no asmitā (the sense of "I am"). Only a residue of saṃskāras remains
      (YS 1.18). This is the state closest to kaivalya within meditative
      experience. It is important to note that the term "asamprajñāta"
      itself does not appear in the sutras — Patañjali says only "the other"
      (anyaḥ). The label comes from Vyāsa's commentary, which has been
      treated as virtually canonical by the tradition.
    doctrinal_significance: >
      Asamprajñāta-samādhi represents the deepest level of meditative
      absorption in Patañjali's system — the point where even the subtlest
      cognitive activity ceases. It is the experiential threshold of
      liberation. For a meditation-focused class, this term names what lies
      beyond the deepest meditation with content: a state that cannot be
      described because there is no cognitive act occurring that could
      become a description.

    ambiguity_notes: >
      The morphological analysis (a + sam + pra + √jñā + -ta) is
      straightforward: it negates the past participle samprajñāta
      ("fully cognized"). The significant ambiguity is doctrinal, not
      morphological. There is an ongoing scholarly debate about whether
      asamprajñāta-samādhi is: (1) a distinct, stable state qualitatively
      different from samprajñāta; (2) the moment of transition between
      samprajñāta stages, when one cognitive support has been released
      and another not yet taken up; or (3) identical with nirbīja-samādhi
      ("seedless samādhi," YS 1.51) or a precursor to it. Vyāsa treats it
      as a stable state. Some modern scholars (e.g., Whicher) argue for
      the transitional reading. The Yoga Sutras' own text is too terse to
      resolve this definitively, which is why the commentary tradition
      became so important. Additionally, Jīva Gosvāmī (Gauḍīya Vaiṣṇava
      tradition, found in GRETIL) explicitly distinguishes asamprajñāta
      from brahma-samādhi, showing that even within Indian philosophy the
      term's scope was debated.
    confidence: high


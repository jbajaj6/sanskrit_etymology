  # ═══════════════════════════════════════════
  # 9. AVIDYĀ
  # ═══════════════════════════════════════════

  - id: avidya
    devanagari: अविद्या
    transliteration: avidyā

    chapter: "YS 2.3–2.5, 2.24, 2.34"
    source_context: >
      YS 2.4: avidyā kṣetram uttareṣāṃ prasupta-tanu-vicchinnodārāṇām
      ("Ignorance is the field for the others [kleśas], whether dormant,
      attenuated, alternating, or fully active"). YS 2.5: anityāśuci-
      duḥkhānātmasu nitya-śuci-sukhātma-khyātir avidyā ("Ignorance is
      seeing the non-eternal as eternal, the impure as pure, the painful
      as pleasant, and the non-self as self"). Found in GRETIL Paramārthasāra:
      "dvaitavikalpabhrāntir avidyā" — "the delusion of dualistic conceptualization
      is avidyā."

    segmentation: "a + √vid + -yā"
    roots:
      - root: "√vid"
        devanagari: "√विद्"
        meaning: "to know, to find, to understand"
        dhatu_number: null
    prefixes:
      - prefix: "a-"
        meaning: "not, without (nañ prefix — negation)"
    suffixes:
      - suffix: "-yā"
        meaning: "abstract noun suffix (feminine)"
        grammatical_function: "forms a feminine abstract noun: vidyā ('knowledge') → avidyā ('non-knowledge')"
    compound_type: null

    literal_gloss: "non-knowledge; the absence or opposite of true seeing"
    philosophical_gloss: >
      Avidyā in the Yoga Sutras is not mere ignorance in the sense of lacking
      information. It is a positive misperception — actively seeing things
      as they are not. Patañjali's fourfold definition (YS 2.5) is precise:
      avidyā is taking the impermanent for permanent, the impure for pure,
      suffering for pleasure, and the non-self for the self. This is the
      root kleśa from which all others grow (YS 2.4). In Advaita Vedānta,
      avidyā plays a similar but metaphysically different role: it is the
      cosmic power of illusion (māyā) that causes the appearance of
      multiplicity. In Buddhism, avidyā (Pali: avijjā) is the first link
      in dependent origination (pratītyasamutpāda) — the fundamental
      ignorance that drives the entire cycle of rebirth. All three traditions
      agree that avidyā is the root problem; they disagree about what it
      conceals.
    doctrinal_significance: >
      Avidyā is the root cause in Patañjali's system — the source from which
      the other four kleśas arise. It is what viveka-khyāti (discriminative
      discernment) destroys. The removal of avidyā is, in effect, synonymous
      with liberation. This makes it the single most important diagnostic
      concept in the Yoga Sutras.

    ambiguity_notes: >
      The derivation a- + vidyā (itself from √vid + -yā) is uncontested.
      The interpretive complexity is philosophical: Patañjali's avidyā is
      a psychological misperception (taking non-self for self), while
      Śaṅkara's avidyā is a cosmic ontological principle (the power that
      projects the world-illusion). These are very different claims wearing
      the same word. Buddhist avidyā is different again — it is ignorance
      of the Four Noble Truths and dependent origination, not ignorance of
      a true self. For this project, the Yoga Sutras definition (YS 2.5)
      is primary.
    confidence: high

    chinese_counterparts:
      - characters: "無明"
        pinyin: "wúmíng"
        mapping_type: semantic
        source: "Standard Buddhist Chinese rendering. Literally 'without brightness/clarity.' Found in dependent origination passages: T01n0001, T01n0003, T01n0007."
    mapping_type: semantic
    phonetic_evidence: null
    semantic_evidence: >
      Chinese 無明 (wúmíng) is a semantic calque: 無 ("without") + 明
      ("brightness, clarity, understanding"). This mirrors the Sanskrit
      structure a- ("without") + vidyā ("knowledge") closely. The Chinese
      rendering foregrounds the metaphor of darkness/obscuration rather than
      the absence of knowledge per se. This is one of the most important
      terms in Chinese Buddhist doctrine, appearing in virtually every
      discussion of dependent origination (十二因緣). CBETA confirms its
      presence in the formula: 無明滅則行滅 ("when avidyā ceases, saṃskāra
      ceases") — T01n0001.
    citation_trail:
      - "T01n0001 (長阿含經): 若無明滅盡是時則無行 (dependent origination formula)"
      - "T01n0003 (大本經): 從無明支有"

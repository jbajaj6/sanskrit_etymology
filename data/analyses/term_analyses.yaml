    devanagari: कैवल्य
    transliteration: kaivalya

    chapter: "YS 2.25, 3.50, 3.55, 4.26, 4.34"
    source_context: >
      YS 4.34: puruṣārtha-śūnyānāṃ guṇānāṃ pratiprasavaḥ kaivalyaṃ
      svarūpa-pratiṣṭhā vā citi-śakteḥ iti ("Kaivalya is the return of
      the guṇas to their source, [their] purpose for puruṣa being exhausted —
      or [equivalently], the power of consciousness established in its own
      nature"). Found in SARIT: Aṣṭāvakragītā 11.6 ("kaivalyamiva saṃprāpto")
      and Bhoja's Rājamārtaṇḍa commentary on YS ("kaivalyamaśnute").

    segmentation: "kevala + -ya"
    roots:
      - root: "kevala"
        devanagari: "केवल"
        meaning: "alone, exclusive, entire, absolute (adjective — not a verbal root)"
        dhatu_number: null
    prefixes: []
    suffixes:
      - suffix: "-ya (taddhita)"
        meaning: "abstract noun suffix"
        grammatical_function: "forms a neuter abstract noun from the adjective kevala: 'the state of being kevala'"
    compound_type: null

    literal_gloss: "aloneness; the state of being exclusively oneself"
    philosophical_gloss: >
      Kaivalya is the telos of Patañjali's Yoga Sutras — the final
      liberation. It is not union (yoga in the popular sense) but isolation:
      puruṣa (pure awareness) stands free in its own nature, permanently
      disentangled from prakṛti (material nature, including the mind). The
      guṇas — the three fundamental qualities of prakṛti — return to their
      latent state, having served their purpose of providing experience and
      eventually prompting liberation. Kaivalya is thus not a blissful
      experience but the end of all experience-for-puruṣa: awareness aware
      of itself alone. This differs sharply from Vedāntic mokṣa (which is
      union with Brahman) and Buddhist nirvāṇa (which is the cessation of
      craving and the end of the rebirth cycle without positing a permanent self).
    doctrinal_significance: >
      Kaivalya names where the entire system is heading. It titles the
      fourth and final chapter of the Yoga Sutras (Kaivalya Pāda). Understanding
      kaivalya is essential because it reveals the dualist metaphysics
      underlying Patañjali's system: the goal is not merger but separation —
      the aloneness of consciousness free from material entanglement.

    ambiguity_notes: >
      Kaivalya is derived from the adjective kevala, not from a verbal root.
      This is morphologically straightforward (Monier-Williams s.v. kaivalya).
      The interpretive challenge is that "aloneness" or "isolation" can sound
      negative or nihilistic to modern ears, but in Sāṃkhya-Yoga it is the
      highest positive state: awareness freed from all that is not itself.
      Some translators soften this to "independence" or "absolute freedom"
      to avoid the negative connotation, which is reasonable but loses the
      precision of "aloneness" (kevala = alone).
    confidence: high


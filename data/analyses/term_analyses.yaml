      The kleśas explain why beings suffer and why yoga is necessary.
      They are not sins or moral failings but psychological structures —
      habitual patterns of misperception. The goal of practice is not to
      suppress them but to attenuate and eventually uproot them through
      the combined force of abhyāsa (practice) and viveka-khyāti
      (discriminative discernment).


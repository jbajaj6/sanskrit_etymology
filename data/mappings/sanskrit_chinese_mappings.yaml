          The Chinese 無明 carries the Buddhist dependent origination
          framework, not the Yoga Sutras' Sāṃkhya framework.
        confidence: high
        ambiguity_notes: null

    overall_mapping_type: semantic_translation
    overall_confidence: high
    overall_notes: >
      Avidyā → 無明 is structurally elegant (a morphological calque),
      doctrinally stable, and massively attested in the Chinese Buddhist
      canon. The dependent origination formula (無明緣行) is confirmed
      across multiple Āgama and sūtra collections. The light/darkness
      metaphor (明 = brightness) is a genuine interpretive choice by the
      translators, not just a neutral transfer. This mapping is one of

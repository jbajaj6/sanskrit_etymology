  # ═══════════════════════════════════════════
  # 8. SAṂSKĀRA
  # ═══════════════════════════════════════════

  - sanskrit_term: saṃskāra
    devanagari: संस्कार
    normalized_slug: samskara

    chinese_candidates:

      - characters: "行"
        pinyin: "xíng"
        historical_reading_notes: >
          Native Chinese character. Primary meanings: "to walk, travel,
          move; to do, act, perform; action, conduct, movement." One of
          the most polysemous characters in the language.
        source_tradition: pan-Buddhist
        attestation_source:
          - "T01n0001 (長阿含經): 無明滅盡是時則無行"
          - "T01n0003 (大本經): 無明緣行"
          - "T02n0099 (雜阿含經): 無明緣行行緣識"
          - "T02n0124: 無明緣行"
          - "Five aggregates: 色受想行識 (rūpa, vedanā, saṃjñā, saṃskāra, vijñāna)"
        mapping_type: semantic_translation
        phonetic_evidence: null
        semantic_evidence: >
          行 captures the "doing/forming" dimension of saṃskāra but not
          the "latent trace" dimension. In the five aggregates (五蘊,
          pañca-skandha), 行 renders saṃskāra-skandha — the aggregate of
          volitional formations. In the twelve links of dependent
          origination (十二因緣), 行 is the second link, conditioned by
          無明 (avidyā). In both cases, 行 foregrounds active formation
          and volitional movement, not the passive residue of past
          experience that the Yoga Sutras emphasize.
        translation_strategy: doctrinal_adaptation
        doctrinal_shift_notes: >
          This mapping involves a significant doctrinal shift. Sanskrit
          saṃskāra has (at minimum) three major senses: (1) ritual
          consecration, (2) latent subliminal impression (Yoga Sutras),
          (3) volitional formation (Buddhist Abhidharma). Chinese 行
          captures sense (3) well but does not capture sense (2) at all.
          The Yoga Sutras' saṃskāra — the unconscious trace that shapes
          future perception — has no neat Chinese equivalent because the
          Yoga Sutras were not translated into Chinese. When Chinese
          Buddhist texts use 行 for saṃskāra, they mean "active volitional
          formations," not "latent impressions." This is one of the most
          consequential doctrinal shifts in the project: the same Sanskrit
          word, filtered through different traditions, yields different
          Chinese meanings depending on which sense of the Sanskrit is
          being rendered.
        confidence: medium
        ambiguity_notes: >
          行 is one of the most overloaded characters in Chinese Buddhist
          translation. It can render saṃskāra, but also carya ("conduct"),
          caryā ("practice"), and other Sanskrit terms involving action or
          movement. Context is essential for disambiguation. The character's
          extreme polysemy means that 行 → saṃskāra is never a simple
          one-to-one mapping.

    overall_mapping_type: semantic_translation
    overall_confidence: medium
    overall_notes: >
      Saṃskāra → 行 is well attested in Buddhist contexts but involves
      a significant narrowing: the Chinese captures "volitional formation"
      but not "latent impression." This is not a translation error — it
      reflects a genuine doctrinal difference between how Buddhist
      Abhidharma and Yoga Sutras understand saṃskāra. The polysemy of
      both the Sanskrit and the Chinese makes this the most complex
      mapping case in the batch. Vulnerable to overstatement if presented
      as a clean equivalence.

  # ═══════════════════════════════════════════
  # 9. SVARŪPA
  # ═══════════════════════════════════════════

  - sanskrit_term: svarūpa
    devanagari: स्वरूप
    normalized_slug: svarupa

    chinese_candidates:

      - characters: "自性"
        pinyin: "zìxìng"
        historical_reading_notes: >
          Native Chinese compound: 自 ("self, own") + 性 ("nature, character,
          essence"). Corresponds more precisely to svabhāva ("own-being")
          than to svarūpa ("own-form"), but the two Sanskrit terms overlap.
        source_tradition: pan-Buddhist, especially Mādhyamaka and Chan/Zen
        attestation_source:
          - "T02n0099 (雜阿含經): 自性"
          - "T03n0157: 自性清淨 ('inherently pure nature')"
          - "Mādhyamaka: 自性空 (svabhāva-śūnyatā, 'empty of own-nature')"
          - "Chan/Zen: 見性 (jiànxìng, 'seeing one's nature')"
        mapping_type: broad_equivalent
        phonetic_evidence: null
        semantic_evidence: >
          自性 maps primarily to svabhāva ("own-being, inherent nature")
          rather than svarūpa ("own-form"). The two Sanskrit terms overlap
          in meaning — both denote the essential nature of something — but
          differ in nuance: svarūpa emphasizes appearance/form (rūpa),
          while svabhāva emphasizes being/existence (bhāva). In Chinese
          Buddhist usage, 自性 appears overwhelmingly in the context of the
          svabhāva debate: does anything have inherent nature? Mādhyamaka
          answers no (自性空, "empty of own-nature"). The Yoga Sutras'
          svarūpa (YS 1.3: "the seer abides in its own form") affirms
          that puruṣa *does* have an essential nature, which is precisely
          what Mādhyamaka denies.
        translation_strategy: doctrinal_adaptation
        doctrinal_shift_notes: >
          Mapping svarūpa to 自性 is philosophically treacherous. In the
          Yoga Sutras, svarūpa is affirmed — puruṣa has a real own-nature,
          and recognizing it is liberation. In Chinese Mādhyamaka, 自性 is
          negated — nothing has inherent nature, and seeing this is
          liberation. The same Chinese term is used to *affirm* what the
          Yoga Sutras claim and to *deny* what Mādhyamaka claims. The
          Chan/Zen expression 見性 (jiànxìng, "seeing one's nature")
          adds further complexity: it superficially resembles svarūpe
          'vasthānam (YS 1.3) but rests on entirely different metaphysics.
          Any presentation of this mapping must emphasize that the
          Chinese term occupies a contested philosophical space.
        confidence: low
        ambiguity_notes: >
          自性 is an imprecise mapping: (1) it renders svabhāva more than
          svarūpa; (2) it is used in Chinese Buddhism primarily to *deny*
          inherent nature, while the Yoga Sutras use svarūpa to *affirm*
          it; (3) the Chan/Zen 見性 looks similar to YS 1.3 but the
          metaphysics are opposed. This mapping is included because the
          conceptual overlap is real, but it should not be presented as
          a clean equivalence. It is better understood as evidence of
          how the same philosophical question (does anything have an
          essential nature?) received opposite answers in different
          traditions.

    overall_mapping_type: broad_equivalent
    overall_confidence: low
    overall_notes: >
      Svarūpa → 自性 is the weakest mapping in this batch. The Chinese
      term corresponds more precisely to svabhāva than svarūpa, and in
      Chinese Buddhist usage it typically appears in contexts that *deny*
      inherent nature — the opposite of the Yoga Sutras' affirmation.
      The mapping is included because the philosophical overlap is
      genuine and illuminating, but it must be presented with heavy
      caveats. This is a case where the gap between the traditions is
      more instructive than the connection.

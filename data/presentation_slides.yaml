      [Switch back to slides]

  # ── SLIDE 14: CONCLUSION ──

  - type: content
    title: "What the Words Know"
    body: |
      **Sanskrit word-structure carries philosophical weight**
      - Roots and prefixes compress arguments about what concepts mean
      **Translation is always interpretation**
      - Sound vs. meaning, darkness vs. ignorance, extinction vs. restraint
      **Cross-cultural transmission is real but partial**
      - dhyāna → zen is rock-solid; the Yoga Sutras' vocabulary has no Chinese equivalent
      **The most instructive cases are sometimes the failures**
    notes: >
      Three takeaways. First, Sanskrit word-structure carries philosophical
      weight. When you break samadhi into "a complete placing-together" or
      abhinivesa into "a deep settling-into," you're not just doing
      linguistics — you're recovering an argument about what these concepts
      mean that the original language encodes and English translations flatten.
      Second, translation is always interpretation. Every Chinese rendering
      made choices — sound or meaning, darkness or ignorance, extinction or
      restraint. Those choices shaped how millions of people understood these
      concepts. Third, cross-cultural transmission is real but partial. The
      dhyana-to-zen connection is rock-solid. But the Yoga Sutras' specialized
      vocabulary has no Chinese counterpart at all. These are different
      traditions sharing a vocabulary, not one tradition in two languages.
      And sometimes the most instructive case is the failure — the place
      where the gap between traditions reveals their deepest commitments.
      Let me end where I started. Yoga Sutra 1.2. After this project, I hear
      it differently. Citta is not just "mind" — it's "the perceived." Vrtti
      is not "thoughts" — it's "turnings." Nirodha is not "stopping" — it's
      "holding back." The words knew what they meant all along. We just had
      to learn how to listen. Thank you.
